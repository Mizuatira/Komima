<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komima - 校园委托</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --pending: #f59e0b;
            --progress: #3b82f6;
            --completed: #10b981;
            --bg: #f8fafc;
        }
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(160deg, #eef2ff 0%, #f0f9ff 40%, var(--bg) 100%);
            min-height: 100vh;
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text);
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary), #818cf8);
            box-shadow: 0 4px 24px rgba(99,102,241,0.25);
            padding: 10px 0;
        }
        .navbar-brand { font-weight: 800; font-size: 1.4rem; display: flex; align-items: center; gap: 8px; }
        .navbar .nav-link {
            font-weight: 500; padding: 8px 16px; border-radius: 8px; transition: all 0.2s; margin: 0 2px; color: #fff;
        }
        .navbar .nav-link:hover, .navbar .nav-link.active { background: rgba(255,255,255,0.15); }
        .user-badge {
            background: rgba(255,255,255,0.15); border-radius: 50px;
            padding: 5px 14px; display: flex; align-items: center; gap: 8px; font-weight: 500; color: #fff;
        }
        .user-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 0.8rem;
        }
        .sidebar {
            background: #fff; border-radius: 18px; box-shadow: 0 2px 16px rgba(0,0,0,0.05);
            padding: 16px; position: sticky; top: 88px;
        }
        .sidebar-btn {
            display: block; width: 100%; text-align: left; border: none; background: none;
            padding: 10px 14px; border-radius: 10px; font-weight: 600; font-size: 0.9rem;
            color: var(--text-muted); transition: all 0.2s; cursor: pointer;
        }
        .sidebar-btn:hover { background: #f1f5f9; color: var(--text); }
        .sidebar-btn.active { background: #eef2ff; color: var(--primary); }
        .sidebar-btn i { margin-right: 8px; }
        .section-title {
            display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
            font-weight: 800; font-size: 1.1rem;
        }
        .task-card {
            background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04); cursor: pointer;
            transition: all 0.2s; border-left: 4px solid transparent;
        }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.08); }
        .task-card.status-pending { border-left-color: var(--pending); }
        .task-card.status-accepted { border-left-color: var(--progress); }
        .task-card.status-completed { border-left-color: var(--completed); }
        .task-card.highlight-recruit { border-left-color: #3b82f6; box-shadow: 0 4px 16px rgba(59,130,246,0.12); }
        .task-title { font-weight: 700; font-size: 0.95rem; }
        .task-desc { color: var(--text-muted); font-size: 0.85rem; margin: 6px 0; }
        .task-meta { display: flex; gap: 14px; font-size: 0.78rem; color: var(--text-muted); flex-wrap: wrap; }
        .status-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 50px; font-weight: 700; }
        .status-pending-badge { background: #fef3c7; color: #92400e; }
        .status-accepted-badge { background: #dbeafe; color: #1e40af; }
        .status-completed-badge { background: #d1fae5; color: #065f46; }
        .tag-badge {
            display: inline-block; padding: 2px 10px; border-radius: 50px;
            font-size: 0.68rem; font-weight: 700; margin-right: 4px;
        }
        .tag-recruit { background: #dbeafe; color: #1e40af; }
        .tag-help { background: #fef3c7; color: #92400e; }
        .tag-hire { background: #fce7f3; color: #9d174d; }
        .tag-reward { background: #d1fae5; color: #065f46; }
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .filter-chip {
            border-radius: 50px; padding: 5px 14px; font-size: 0.78rem; font-weight: 600;
            cursor: pointer; border: 1.5px solid var(--border); background: #fff;
            color: var(--text-muted); transition: all 0.2s;
        }
        .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
        .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn-primary { background: var(--primary); border: none; border-radius: 10px; font-weight: 600; padding: 9px 20px; }
        .btn-primary:hover { background: var(--primary-dark); }
        .detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .detail-label { width: 80px; font-weight: 700; color: var(--text-muted); font-size: 0.85rem; }
        .detail-value { flex: 1; font-size: 0.88rem; }
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 4px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 2rem; cursor: pointer; color: #d1d5db; transition: all 0.2s; }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label { color: #fbbf24; }
        .data-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; }
        .custom-toast {
            background: #fff; border-radius: 14px; padding: 14px 18px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px; font-weight: 600; animation: slideIn 0.35s ease;
        }
        .custom-toast.success { border-left: 4px solid #10b981; color: #065f46; }
        .custom-toast.error { border-left: 4px solid #ef4444; color: #991b1b; }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .hero-stats { display: flex; gap: 16px; margin-bottom: 20px; }
        .hero-stat {
            flex: 1; background: #fff; border-radius: 14px; padding: 14px 18px;
            text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .hero-stat .num { font-size: 1.6rem; font-weight: 800; }
        .hero-stat .lbl { font-size: 0.75rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-lightning-charge-fill"></i>Komima</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html"><i class="bi bi-house-fill me-1"></i>首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="publish.html"><i class="bi bi-plus-circle-fill me-1"></i>发布</a></li>
                    <li class="nav-item" id="adminNav"><a class="nav-link" href="#" id="navAdmin" onclick="showView('admin')"><i class="bi bi-shield-fill me-1"></i>后台</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html"><i class="bi bi-person-fill me-1"></i>个人</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <div class="user-badge">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <span id="currentUser">用户</span>
                    </div>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- ADMIN -->
        <div id="viewAdmin" style="display:none">
            <div style="max-width:900px;margin:0 auto;">
                <ul class="nav nav-tabs mb-3" id="adminTabs">
                    <li class="nav-item"><button class="nav-link active" onclick="switchAdminTab('users')">用户管理</button></li>
                    <li class="nav-item"><button class="nav-link" onclick="switchAdminTab('tasks')">委托管理</button></li>
                </ul>
                <div id="adminUsersPanel" class="data-card">
                    <table class="table table-borderless mb-0">
                        <thead><tr><th>ID</th><th>用户</th><th>角色</th><th>评分</th><th>时间</th><th>操作</th></tr></thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
                <div id="adminTasksPanel" class="data-card" style="display:none">
                    <table class="table table-borderless mb-0">
                        <thead><tr><th>ID</th><th>标题</th><th>发布人</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
                        <tbody id="adminTaskTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="row" id="homeRow">
            <div class="col-lg-3 mb-3">
                <div class="sidebar">
                    <div class="fw-bold mb-2" style="font-size:0.8rem;color:var(--text-muted);">任务状态</div>
                    <button class="sidebar-btn active" onclick="switchList('pending')"><i class="bi bi-clock"></i>待接单</button>
                    <button class="sidebar-btn" onclick="switchList('progress')"><i class="bi bi-arrow-repeat"></i>进行中</button>
                    <button class="sidebar-btn" onclick="switchList('completed')"><i class="bi bi-check-circle"></i>已完成</button>
                    <hr style="margin:10px 0;">
                    <button class="sidebar-btn" onclick="switchList('my')"><i class="bi bi-send"></i>我的发布</button>
                    <button class="sidebar-btn" onclick="switchList('accepted')"><i class="bi bi-inbox"></i>我承接的</button>
                    <div class="mt-3">
                        <a class="btn btn-primary btn-sm w-100" href="publish.html"><i class="bi bi-plus-lg me-1"></i>发布新委托</a>
                    </div>
                </div>
            </div>
            <div class="col-lg-9">
                <!-- HOME -->
                <div id="viewHome">
                    <div class="hero-stats" id="heroStats">
                        <div class="hero-stat" style="cursor:pointer" onclick="switchList('pending')"><div class="num text-warning" id="statPending">0</div><div class="lbl">待接单</div></div>
                        <div class="hero-stat" style="cursor:pointer" onclick="switchList('progress')"><div class="num text-primary" id="statProgress">0</div><div class="lbl">进行中</div></div>
                        <div class="hero-stat" style="cursor:pointer" onclick="switchList('completed')"><div class="num text-success" id="statDone">0</div><div class="lbl">已完成</div></div>
                    </div>
                    <div class="filter-bar" id="filterBar">
                        <span class="filter-chip active" onclick="setFilter()">全部</span>
                        <span class="filter-chip" onclick="setFilter('category',0)">招募</span>
                        <span class="filter-chip" onclick="setFilter('category',1)">求助</span>
                        <span class="filter-chip" onclick="setFilter('category',2)">雇佣</span>
                        <span style="color:var(--text-muted);margin:0 2px;">|</span>
                        <span class="filter-chip" onclick="setFilter('hasReward',1)">💰 有报酬</span>
                    </div>
                    <div id="taskList"></div>
                </div>

                </div>
            </div>
        </div>
    </div>

    <!-- TASK MODAL -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius:16px;">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="taskTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="detail-row"><span class="detail-label">描述</span><span class="detail-value" id="taskContent"></span></div>
                    <div class="detail-row"><span class="detail-label">发布人</span><span class="detail-value" id="taskUserId"></span></div>
                    <div class="detail-row"><span class="detail-label">接单人</span><span class="detail-value" id="taskReceiverId"></span></div>
                    <div class="detail-row"><span class="detail-label">状态</span><span class="detail-value" id="taskStatus"></span></div>
                    <div class="detail-row"><span class="detail-label">时间</span><span class="detail-value" id="taskCreateTime"></span></div>
                    <div class="detail-row"><span class="detail-label">确认</span><span class="detail-value" id="taskConfirmInfo"></span></div>
                    <div id="applicantsSection" style="display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
                        <strong style="font-size:0.85rem;">申请人</strong>
                        <div id="applicantsList" class="mt-2"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button class="btn btn-outline-danger" id="delTaskBtn" onclick="delMyTask()"><i class="bi bi-trash me-1"></i>删除</button>
                    <button class="btn btn-primary" id="applyBtn" onclick="applyTask()"><i class="bi bi-send me-1"></i>申请</button>
                    <button class="btn btn-warning" id="cancelApplyBtn" onclick="cancelApply()"><i class="bi bi-arrow-return-left me-1"></i>撤销</button>
                    <button class="btn btn-success" id="confirmBtn" onclick="confirmCompleteTask()"><i class="bi bi-check-circle me-1"></i>确认完成</button>
                    <button class="btn btn-warning" id="evaluateBtn" data-bs-toggle="modal" data-bs-target="#evaluateModal"><i class="bi bi-star-fill me-1"></i>评价</button>
                </div>
            </div>
        </div>
    </div>

    <!-- EVALUATE MODAL -->
    <div class="modal fade" id="evaluateModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius:16px;">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold"><i class="bi bi-star-fill text-warning me-2"></i>评价 <span id="evalTargetName"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-4">
                        <label class="form-label fw-bold mb-2">评分</label>
                        <div class="star-rating">
                            <input type="radio" name="score" value="5" id="s5" checked><label for="s5"><i class="bi bi-star-fill"></i></label>
                            <input type="radio" name="score" value="4" id="s4"><label for="s4"><i class="bi bi-star-fill"></i></label>
                            <input type="radio" name="score" value="3" id="s3"><label for="s3"><i class="bi bi-star-fill"></i></label>
                            <input type="radio" name="score" value="2" id="s2"><label for="s2"><i class="bi bi-star-fill"></i></label>
                            <input type="radio" name="score" value="1" id="s1"><label for="s1"><i class="bi bi-star-fill"></i></label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">评语</label>
                        <textarea class="form-control" id="evaluateContent" rows="3" placeholder="写下评价..." style="border-radius:12px;"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button class="btn btn-primary" onclick="submitEvaluate()"><i class="bi bi-send me-1"></i>提交</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:8080/api';
        const uid = parseInt(localStorage.getItem('userId'));
        const nick = localStorage.getItem('nickname') || '用户';
        const role = localStorage.getItem('role');

        if (!uid) location.href = 'login.html';

        let curTaskId, evalTargetId, evalTargetName;
        let curFilter = {}, curList = 'pending';
        let tasks = [], userMap = {}, allStats = [0, 0, 0], pollTimer;

        document.getElementById('currentUser').textContent = nick;
        document.getElementById('userAvatar').textContent = nick.charAt(0).toUpperCase();
        if (role !== '1') document.getElementById('adminNav').style.display = 'none';
        if (role === '1' && sessionStorage.getItem('showAdmin') === '1') {
            showView('admin');
            sessionStorage.removeItem('showAdmin');
        }
        fetch(`${API}/user/${uid}`).then(r => r.json()).then(d => {
            if (d.code === 200 && d.data.avgRating) {
                document.getElementById('currentUser').innerHTML = nick + ` <span style="color:#fbbf24;font-size:0.75rem;">★${d.data.avgRating}</span>`;
            }
        });

        /* ---- UTILS ---- */
        function showToast(msg, type) {
            type = type || 'success';
            const t = document.createElement('div');
            t.className = `custom-toast ${type}`;
            t.innerHTML = `<span>${msg}</span>`;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2500);
        }
        function logout() { localStorage.clear(); location.href = 'login.html'; }
        function S(s) { return {0:'待接单',1:'进行中',2:'已完成'}[s] || '?'; }
        function Si(s) { return {0:'bi-clock',1:'bi-person-check',2:'bi-check-circle'}[s] || ''; }
        function Sb(s) { return {0:'status-pending-badge',1:'status-accepted-badge',2:'status-completed-badge'}[s] || ''; }
        function Sc(s) { return {0:'status-pending',1:'status-accepted',2:'status-completed'}[s] || ''; }
        function T(d) { if (!d) return ''; const dt = new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; }
        function nickOf(id) { const u = userMap[id]; return u ? u.name : '#' + id; }
        function nickLink(id) { const u = userMap[id]; return u ? `<a href="user.html?id=${id}" style="color:var(--primary);font-weight:600;text-decoration:none;">${u.name}</a>` : '#' + id; }
        function tagHtml(c, r) {
            const m = {0:['tag-recruit','招募'],1:['tag-help','求助'],2:['tag-hire','雇佣']};
            const [cl, tx] = m[c] || ['',''];
            return `<span class="tag-badge ${cl}">${tx}</span>` + (r === 1 ? '<span class="tag-badge tag-reward">💰 报酬</span>' : '');
        }

        /* ---- USER MAP ---- */
        function loadUserMap(cb) {
            fetch(`${API}/user/list`).then(r => r.json()).then(d => {
                if (d.code === 200) d.data.forEach(u => { userMap[u.id] = { name: u.nickname || u.username, avg: u.avgRating || 0 }; });
                if (cb) cb();
            });
        }

        /* ---- VIEW SWITCH ---- */
        function showView(v) {
            document.querySelectorAll('.navbar .nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('viewHome').style.display = v === 'home' ? '' : 'none';
            document.getElementById('viewAdmin').style.display = v === 'admin' ? '' : 'none';
            document.getElementById('homeRow').style.display = v === 'home' ? '' : 'none';
            stopPoll();
            if (v === 'home') { document.getElementById('viewHome').style.display = ''; document.querySelector('.navbar-nav .nav-link[href="index.html"]').classList.add('active'); loadTasks(); startPoll(); }
            else if (v === 'admin') { document.getElementById('navAdmin').classList.add('active'); loadAdminUsers(); }
        }

        /* ---- LIST ---- */
        function switchList(type) {
            curList = type; curFilter = {};
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));

            const labelMap = { pending: '待接单', progress: '进行中', completed: '已完成', my: '我的发布', accepted: '我承接的' };
            [...document.querySelectorAll('.sidebar-btn')].find(b => b.textContent.trim() === labelMap[type])?.classList.add('active');

            document.getElementById('filterBar').style.display = type === 'pending' ? '' : 'none';

            if (type === 'pending' && curFilter.category === undefined && curFilter.hasReward === undefined) {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                document.querySelector('.filter-chip').classList.add('active');
            }
            loadTasks();
        }
        function setFilter(k, v) {
            if (!k) curFilter = {}; else curFilter[k] = v;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            if (Object.keys(curFilter).length === 0) {
                document.querySelector('.filter-chip').classList.add('active');
            } else {
                [...document.querySelectorAll('.filter-chip')].forEach(c => {
                    const o = c.getAttribute('onclick');
                    if (o && o.includes(`'${k}',${v}`)) c.classList.add('active');
                });
            }
            curList = 'pending';
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.sidebar-btn').classList.add('active');
            loadTasks();
        }
        function loadTasks() {
            let url = `${API}/task/list`;
            if (curList === 'my') url = `${API}/task/list/user/${uid}`;
            else if (curList === 'accepted') url = `${API}/task/list/applicant/${uid}`;
            else {
                const p = [];
                if (curList === 'pending') { p.push('status=0'); p.push(`excludeUserId=${uid}`); }
                else if (curList === 'progress') p.push('status=1');
                else if (curList === 'completed') p.push('status=2');
                if (curList === 'pending') {
                    if (curFilter.category !== undefined) p.push(`category=${curFilter.category}`);
                    if (curFilter.hasReward !== undefined) p.push(`hasReward=${curFilter.hasReward}`);
                }
                if (p.length) url += '?' + p.join('&');
            }
            fetch(url).then(r => r.json()).then(d => {
                if (d.code === 200) { tasks = d.data; renderTasks(); }
            });
        }
        function renderTasks() {
            const el = document.getElementById('taskList');
            document.getElementById('statPending').textContent = allStats[0];
            document.getElementById('statProgress').textContent = allStats[1];
            document.getElementById('statDone').textContent = allStats[2];
            if (!tasks.length) {
                const emptyMsgs = { pending: '暂无待接单委托', progress: '暂无进行中的委托', completed: '暂无已完成的委托', my: '你还没有发布委托', accepted: '你还没有承接委托' };
                el.innerHTML = `<p class="text-muted text-center py-4">${emptyMsgs[curList] || '暂无委托'}</p>`;
                return;
            }
            el.innerHTML = tasks.map(t => `
                <div class="task-card ${Sc(t.status)} ${t.category === 0 ? 'highlight-recruit' : ''}" onclick="openTask(${t.id})">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="task-title"><i class="bi ${Si(t.status)} me-2"></i>${t.title} ${tagHtml(t.category, t.hasReward)}</div>
                        <span class="status-badge ${Sb(t.status)}">${S(t.status)}</span>
                    </div>
                    <p class="task-desc">${t.content.substring(0,55)}${t.content.length > 55 ? '...' : ''}</p>
                    <div class="task-meta">
                        <span><i class="bi bi-person"></i>${nickLink(t.userId)}</span>
                        <span><i class="bi bi-clock"></i>${T(t.createTime)}</span>
                        ${t.status === 0 ? `<span><i class="bi bi-people"></i>${t.approvedCount||0}/${t.recruitCount||1} 人</span>` : ''}
                        ${t.status === 0 && t.applyCount > 0 ? `<span style="color:var(--primary);font-weight:600;"><i class="bi bi-person-plus"></i>已有${t.applyCount}人申请</span>` : ''}
                    </div>
                </div>`).join('');
        }

        /* ---- TASK DETAIL ---- */
        function openTask(id) {
            curTaskId = id;
            fetch(`${API}/task/${id}`).then(r => r.json()).then(d => {
                if (d.code !== 200) return;
                const t = d.data;
                document.getElementById('taskTitle').innerHTML = `<i class="bi ${Si(t.status)} me-2"></i>${t.title} ${tagHtml(t.category, t.hasReward)}`;
                document.getElementById('taskContent').textContent = t.content;
                document.getElementById('taskUserId').innerHTML = nickLink(t.userId);
                document.getElementById('taskReceiverId').innerHTML = `${t.approvedCount||0}/${t.recruitCount||1} 人已选`;
                document.getElementById('taskStatus').innerHTML = `<span class="status-badge ${Sb(t.status)}">${S(t.status)}</span>`;
                document.getElementById('taskCreateTime').textContent = T(t.createTime);
                document.getElementById('taskConfirmInfo').textContent = t.status === 2 ? '已全部完成' : (t.status === 0 ? '—' : '');

                const isPub = t.userId === uid;
                document.getElementById('delTaskBtn').style.display = (t.status === 0 && isPub) ? '' : 'none';
                document.getElementById('applyBtn').style.display = 'none';
                document.getElementById('cancelApplyBtn').style.display = 'none';
                if (t.status === 0 && !isPub) {
                    fetch(`${API}/application/list/${id}`).then(r => r.json()).then(d => {
                        if (d.code === 200) {
                            const myApp = d.data.find(a => a.applicantId === uid && a.status === 0);
                            if (myApp) {
                                document.getElementById('cancelApplyBtn').style.display = '';
                            } else {
                                document.getElementById('applyBtn').style.display = '';
                            }
                        }
                    });
                }
                document.getElementById('confirmBtn').style.display = 'none';
                document.getElementById('evaluateBtn').style.display = 'none';

                if (t.status === 0 && isPub) {
                    document.getElementById('applicantsSection').style.display = '';
                    loadApplicants(id, t);
                } else if (t.status === 1 || t.status === 2) {
                    document.getElementById('applicantsSection').style.display = '';
                    loadApprovedList(id, t);
                } else {
                    document.getElementById('applicantsSection').style.display = 'none';
                }
                new bootstrap.Modal(document.getElementById('taskModal')).show();
            });
        }

        function loadApplicants(tid, task) {
            fetch(`${API}/application/list/${tid}`).then(r => r.json()).then(d => {
                if (d.code !== 200) return;
                const apps = d.data.filter(a => a.status === 0);
                const header = document.querySelector('#applicantsSection strong');
                if (header) header.textContent = `申请人 (${apps.length})`;
                if (!apps.length) {
                    document.getElementById('applicantsList').innerHTML = '<p class="text-muted small">暂无申请</p>';
                } else {
                    document.getElementById('applicantsList').innerHTML = apps.map(a => `
                        <div class="d-flex justify-content-between align-items-center mb-2 p-2" style="background:#f8fafc;border-radius:8px;">
                            <strong>${nickLink(a.applicantId)}</strong>
                            <div>
                                <button class="btn btn-outline-primary btn-sm" onclick="window.open('user.html?id=${a.applicantId}')">查看</button>
                                <button class="btn btn-success btn-sm ms-1" onclick="approveApplicant(${a.taskId},${a.applicantId})">选择</button>
                                <button class="btn btn-outline-danger btn-sm ms-1" onclick="rejectApplicant(${a.taskId},${a.applicantId})">拒绝</button>
                            </div>
                        </div>`).join('');
                }
            });
        }

        function loadApprovedList(tid, task) {
            fetch(`${API}/application/list/${tid}`).then(r => r.json()).then(d => {
                if (d.code !== 200) return;
                const approved = d.data.filter(a => a.status === 1);
                const header = document.querySelector('#applicantsSection strong');
                if (header) header.textContent = `已选成员 (${task.approvedCount||approved.length}/${task.recruitCount||1})`;
                if (!approved.length) {
                    document.getElementById('applicantsList').innerHTML = '<p class="text-muted small">暂无</p>';
                    return;
                }
                const isPub = task.userId === uid;
                document.getElementById('applicantsList').innerHTML = approved.map(a => {
                    const pOk = isTrue(a.confirmPublisher), aOk = isTrue(a.confirmApplicant);
                    const both = pOk && aOk;
                    const myApp = a.applicantId === uid;
                    const canConfirm = (isPub || myApp) && !both && !(isPub ? pOk : aOk);
                    return `<div class="d-flex justify-content-between align-items-center mb-2 p-2" style="background:#f8fafc;border-radius:8px;">
                        <div>
                            <strong>${nickLink(a.applicantId)}</strong>
                            <span class="ms-2 small ${both?'text-success':''}">
                                ${pOk?'<span class="text-success">发布方✓</span>':'<span class="text-muted">发布方✗</span>'}
                                ${aOk?' <span class="text-success">本人✓</span>':' <span class="text-muted">本人✗</span>'}
                            </span>
                        </div>
                        <div>
                            ${canConfirm ? `<button class="btn btn-success btn-sm" onclick="confirmApplicant(${a.id})">确认完成</button>` : (both?'<span class="status-badge status-completed-badge">已完成</span>':'')}
                            ${task.status===2 && (isPub||myApp) ? `<button class="btn btn-warning btn-sm ms-1" onclick="evaluateApplicant(${a.applicantId})">评价</button>` : ''}
                        </div>
                    </div>`;
                }).join('');
            });
        }

        function isTrue(v) { return v === 1; }

        /* ---- ACTIONS ---- */
        function applyTask() {
            fetch(`${API}/application/apply?taskId=${curTaskId}&userId=${uid}`, { method: 'POST' })
                .then(r => r.json()).then(d => { showToast(d.code === 200 ? '已申请' : d.message); if (d.code === 200) closeModal(); });
        }
        function cancelApply() {
            if (!confirm('确定撤销申请？')) return;
            fetch(`${API}/application/cancel?taskId=${curTaskId}&userId=${uid}`, { method: 'POST' })
                .then(r => r.json()).then(d => { showToast(d.code === 200 ? '已撤销' : d.message); if (d.code === 200) closeModal(); });
        }
        function approveApplicant(tid, aid) {
            fetch(`${API}/application/approve?taskId=${tid}&applicantId=${aid}&publisherId=${uid}`, { method: 'POST' })
                .then(r => r.json()).then(d => { showToast(d.message); if (d.code === 200) closeModal(); });
        }
        function rejectApplicant(tid, aid) {
            if (!confirm('确定拒绝？')) return;
            fetch(`${API}/application/reject?taskId=${tid}&applicantId=${aid}&publisherId=${uid}`, { method: 'POST' })
                .then(r => r.json()).then(d => { showToast(d.message); closeModal(); });
        }
        function confirmApplicant(appId) {
            fetch(`${API}/application/${appId}/confirm?userId=${uid}`, { method: 'POST' })
                .then(r => r.json()).then(d => { showToast(d.message); if (d.code === 200) closeModal(); });
        }
        function evaluateApplicant(targetId) {
            evalTargetId = targetId; evalTargetName = nickOf(targetId);
            document.getElementById('evalTargetName').textContent = evalTargetName;
            document.getElementById('evaluateContent').value = '';
            document.getElementById('s5').checked = true;
            new bootstrap.Modal(document.getElementById('evaluateModal')).show();
        }
        function submitEvaluate() {
            const sc = document.querySelector('input[name="score"]:checked').value;
            const ct = document.getElementById('evaluateContent').value;
            fetch(`${API}/evaluate/create`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ taskId: curTaskId, fromUserId: uid, toUserId: evalTargetId, score: sc, content: ct })
            }).then(r => r.json()).then(d => {
                if (d.code === 200) {
                    showToast('评价成功');
                    bootstrap.Modal.getInstance(document.getElementById('evaluateModal')).hide();
                    closeModal();
                } else showToast(d.message, 'error');
            });
        }
        function delMyTask() {
            if (!confirm('确定删除此委托？')) return;
            fetch(`${API}/task/${curTaskId}?userId=${uid}`, { method: 'DELETE' })
                .then(r => r.json()).then(d => { showToast(d.message); if (d.code === 200) closeModal(); });
        }
        function closeModal() {
            bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();
            loadTasks();
        }

        /* ---- POLL ---- */
        function startPoll() {
            stopPoll();
            pollTimer = setInterval(() => {
                if (document.getElementById('viewHome').style.display !== 'none') {
                    loadTasks();
                    fetch(`${API}/task/list`).then(r => r.json()).then(d => {
                        if (d.code === 200) {
                            allStats[0] = d.data.filter(t => t.status === 0).length;
                            allStats[1] = d.data.filter(t => t.status === 1).length;
                            allStats[2] = d.data.filter(t => t.status === 2).length;
                            document.getElementById('statPending').textContent = allStats[0];
                            document.getElementById('statProgress').textContent = allStats[1];
                            document.getElementById('statDone').textContent = allStats[2];
                        }
                    });
                }
            }, 8000);
        }
        function stopPoll() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

        /* ---- ADMIN ---- */
        function switchAdminTab(tab) {
            document.querySelectorAll('#adminTabs .nav-link').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('adminUsersPanel').style.display = tab === 'users' ? '' : 'none';
            document.getElementById('adminTasksPanel').style.display = tab === 'tasks' ? '' : 'none';
            if (tab === 'users') loadAdminUsers(); else loadAdminTasks();
        }
        function loadAdminUsers() {
            fetch(`${API}/admin/users`).then(r => r.json()).then(d => {
                if (d.code !== 200) return;
                document.getElementById('userTableBody').innerHTML = d.data.map(u => `
                    <tr><td>${u.id}</td><td><strong>${u.nickname||u.username}</strong><br><small class="text-muted">@${u.username}</small></td>
                    <td><span class="status-badge ${u.role===1?'status-completed-badge':'status-pending-badge'}">${u.role===1?'管理员':'用户'}</span></td>
                    <td>${u.avgRating ? '★'.repeat(Math.round(u.avgRating)) + u.avgRating : '—'}</td>
                    <td><small>${T(u.createTime)}</small></td>
                    <td>
                        ${u.role!==1 ? `<button class="btn btn-warning btn-sm" onclick="setRole(${u.id},1)">升管理员</button>` : `<button class="btn btn-secondary btn-sm" onclick="setRole(${u.id},0)">取消</button>`}
                        <button class="btn btn-danger btn-sm ms-1" onclick="delUser(${u.id})">删除</button>
                    </td></tr>`).join('');
            });
        }
        function loadAdminTasks() {
            fetch(`${API}/admin/tasks`).then(r => r.json()).then(d => {
                if (d.code !== 200) return;
                document.getElementById('adminTaskTableBody').innerHTML = d.data.map(t =>
                    `<tr><td>${t.id}</td><td>${t.title}</td><td>${nickOf(t.userId)}</td>
                    <td><span class="status-badge ${Sb(t.status)}">${S(t.status)}</span></td>
                    <td><small>${T(t.createTime)}</small></td>
                    <td><button class="btn btn-danger btn-sm" onclick="delTask(${t.id})">删除</button></td></tr>`).join('');
            });
        }
        function setRole(id, r) {
            fetch(`${API}/admin/user/${id}/role?role=${r}`, { method: 'PUT' })
                .then(r => r.json()).then(d => { if (d.code === 200) { showToast('已更新'); loadAdminUsers(); } });
        }
        function delUser(id) {
            if (!confirm('确定删除此用户？')) return;
            fetch(`${API}/admin/user/${id}`, { method: 'DELETE' })
                .then(r => r.json()).then(d => { if (d.code === 200) { showToast('已删除'); loadAdminUsers(); } });
        }
        function delTask(id) {
            if (!confirm('确定删除此委托？')) return;
            fetch(`${API}/admin/task/${id}`, { method: 'DELETE' })
                .then(r => r.json()).then(d => { if (d.code === 200) { showToast('已删除'); loadAdminTasks(); loadTasks(); } });
        }

        /* ---- INIT ---- */
        loadUserMap(() => {
            loadTasks();
            fetch(`${API}/task/list`).then(r => r.json()).then(d => {
                if (d.code === 200) {
                    allStats[0] = d.data.filter(t => t.status === 0).length;
                    allStats[1] = d.data.filter(t => t.status === 1).length;
                    allStats[2] = d.data.filter(t => t.status === 2).length;
                    document.getElementById('statPending').textContent = allStats[0];
                    document.getElementById('statProgress').textContent = allStats[1];
                    document.getElementById('statDone').textContent = allStats[2];
                }
            });
            startPoll();
        });
    </script>
</body>
</html>
