<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户主页 - Komima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        * { box-sizing: border-box; }
        body { background: linear-gradient(160deg,#eef2ff,#f0f9ff,#f8fafc); min-height:100vh; font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; color:var(--text); }
        .navbar { background: linear-gradient(135deg,var(--primary-dark),var(--primary),#818cf8); box-shadow:0 4px 24px rgba(99,102,241,0.25); padding:10px 0; }
        .navbar-brand { font-weight:800; font-size:1.4rem; }
        .navbar .nav-link { color:#fff; font-weight:500; }
        .profile-card { background:#fff; border-radius:20px; box-shadow:0 4px 24px rgba(0,0,0,0.06); padding:32px; max-width:680px; margin:24px auto; text-align:center; }
        .avatar-large { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--primary),#8b5cf6); display:inline-flex; align-items:center; justify-content:center; color:#fff; font-size:2rem; font-weight:800; margin-bottom:12px; }
        .profile-card h3 { font-weight:800; }
        .rating-stars { color:#fbbf24; font-size:1.1rem; }
        .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 24px; text-align:left; margin-top:16px; }
        .info-grid span { color:var(--text-muted); font-size:0.85rem; }
        .section-card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.06); padding:24px; max-width:800px; margin:0 auto 20px; }
        .section-card h5 { font-weight:800; margin-bottom:16px; }
        .task-item { background:#f8fafc; border-radius:10px; padding:10px 14px; margin-bottom:8px; font-size:0.9rem; display:flex; justify-content:space-between; align-items:center; }
        .eval-item { background:#fefce8; border-radius:10px; padding:10px 14px; margin-bottom:8px; font-size:0.88rem; }
        .eval-item .stars { color:#fbbf24; }
        .status-badge { font-size:0.7rem; padding:3px 10px; border-radius:50px; font-weight:700; }
        .status-pending-badge { background:#fef3c7; color:#92400e; }
        .status-accepted-badge { background:#dbeafe; color:#1e40af; }
        .status-completed-badge { background:#d1fae5; color:#065f46; }
        .toast-container { position:fixed; top:24px; right:24px; z-index:9999; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-lightning-charge-fill"></i> Komima</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html"><i class="bi bi-house-fill me-1"></i>首页</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="profile-card">
            <div class="avatar-large" id="avatar">U</div>
            <h3 id="name">加载中...</h3>
            <p class="text-muted">@<span id="uname"></span></p>
            <div class="rating-stars" id="rating"></div>
            <div class="info-grid" id="info"></div>
        </div>
        <div class="section-card"><h5><i class="bi bi-send me-2"></i>发布的委托</h5><div id="pubTasks"><p class="text-muted">暂无</p></div></div>
        <div class="section-card"><h5><i class="bi bi-inbox me-2"></i>承接的委托</h5><div id="accTasks"><p class="text-muted">暂无</p></div></div>
        <div class="section-card"><h5><i class="bi bi-star-fill me-2"></i>收到的评价</h5><div id="evals"><p class="text-muted">暂无</p></div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:8080/api';
        const pid = new URLSearchParams(location.search).get('id');
        if (!pid) location.href = 'index.html';

        const S = {0:'待接单',1:'进行中',2:'已完成'};
        const Sb = {0:'status-pending-badge',1:'status-accepted-badge',2:'status-completed-badge'};

        fetch(`${API}/evaluate/user/${pid}/profile`).then(r => r.json()).then(d => {
            if (d.code !== 200) return;
            const vo = d.data, u = vo.user;
            document.getElementById('avatar').textContent = (u.nickname||u.username).charAt(0).toUpperCase();
            document.getElementById('name').textContent = u.nickname||u.username;
            document.getElementById('uname').textContent = u.username;

            const r = u.avgRating ? '★'.repeat(Math.round(u.avgRating)) + '☆'.repeat(5-Math.round(u.avgRating)) + ` ${u.avgRating}` : '暂无评分';
            document.getElementById('rating').innerHTML = `<span style="font-size:0.9rem;">${r}</span>`;

            const gm = {0:'未设置',1:'男',2:'女'};
            document.getElementById('info').innerHTML = `
                <span>性别: ${gm[u.gender||0]}</span><span>学院: ${u.college||'—'}</span>
                <span>专业: ${u.major||'—'}</span><span>电话: ${u.phone||'—'}</span>
                <span>微信: ${u.wechat||'—'}</span><span>QQ: ${u.qq||'—'}</span>
                <span style="grid-column:1/-1">邮箱: ${u.email||'—'}</span>`;

            renderList('pubTasks', vo.publishedTasks);
            renderList('accTasks', vo.acceptedTasks);
            renderEvals(vo.evaluations);
        });

        function renderList(elId, list) {
            const el = document.getElementById(elId);
            const f = (list||[]).filter(t => t.status === 2);
            if (!f.length) { el.innerHTML = '<p class="text-muted">暂无已完成</p>'; return; }
            el.innerHTML = f.map(t => `<div class="task-item"><span><strong>${t.title}</strong></span><span class="status-badge ${Sb[t.status]||''}">${S[t.status]||''}</span></div>`).join('');
        }
        function renderEvals(evals) {
            const el = document.getElementById('evals');
            if (!evals.length) { el.innerHTML = '<p class="text-muted">暂无评价</p>'; return; }
            el.innerHTML = evals.map(e => `
                <div class="eval-item"><div class="stars">${'★'.repeat(e.score)}${'☆'.repeat(5-e.score)}</div>
                <span class="text-muted">${e.content||'无评语'}</span>
                <small class="text-muted float-end">${new Date(e.createTime).toLocaleDateString()}</small></div>`).join('');
        }
    </script>
</body>
</html>
