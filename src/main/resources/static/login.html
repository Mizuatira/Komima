<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Komima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #eef2ff 0%, #f0f9ff 50%, #f8fafc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(99,102,241,0.15);
            padding: 48px 40px;
            width: 420px;
            max-width: 95vw;
        }
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand .icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
            margin-bottom: 12px;
        }
        .brand h2 { font-weight: 800; font-size: 1.5rem; color: var(--text); }
        .brand p { color: var(--text-muted); font-size: 0.9rem; }
        .form-control {
            border-radius: 12px;
            border: 1.5px solid var(--border);
            padding: 12px 16px 12px 42px;
            font-size: 0.95rem;
            transition: all 0.25s;
            background: #f8fafc;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
            background: #fff;
        }
        .input-group { position: relative; margin-bottom: 18px; }
        .input-group i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            z-index: 5;
        }
        .btn { border-radius: 12px; font-weight: 600; padding: 12px 24px; }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark), #7c3aed);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.4);
        }
        .toggle-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .toggle-link:hover { text-decoration: underline; }
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; }
        .custom-toast {
            background: white;
            border-radius: 14px;
            padding: 16px 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            animation: slideInRight 0.35s ease;
            font-weight: 600;
        }
        .custom-toast.success { border-left: 4px solid #10b981; }
        .custom-toast.error { border-left: 4px solid #ef4444; }
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <div class="icon"><i class="bi bi-lightning-charge-fill"></i></div>
            <h2 id="formTitle">登录 Komima</h2>
            <p id="formSubtitle">校园委托对接系统</p>
        </div>
        <form id="authForm">
            <div class="input-group">
                <i class="bi bi-person-fill"></i>
                <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
            </div>
            <div class="input-group" id="nicknameGroup" style="display:none">
                <i class="bi bi-pencil-fill"></i>
                <input type="text" class="form-control" id="nickname" placeholder="请输入昵称">
            </div>
            <div class="input-group">
                <i class="bi bi-lock-fill"></i>
                <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                <i class="bi bi-box-arrow-in-right me-2"></i>登 录
            </button>
        </form>
        <div class="toggle-link" id="toggleMode" onclick="toggleForm()">还没有账号？立即注册</div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:8080/api';
        let isLogin = true;

        function showToast(msg, type) {
            const t = document.createElement('div');
            t.className = `custom-toast ${type}`;
            t.innerHTML = `<span>${msg}</span>`;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.35s'; setTimeout(() => t.remove(), 350); }, 2500);
        }

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('formTitle').textContent = isLogin ? '登录 Komima' : '注册 Komima';
            document.getElementById('formSubtitle').textContent = isLogin ? '校园委托对接系统' : '加入校园互助平台';
            document.getElementById('submitBtn').innerHTML = isLogin ? '<i class="bi bi-box-arrow-in-right me-2"></i>登 录' : '<i class="bi bi-person-plus-fill me-2"></i>注 册';
            document.getElementById('toggleMode').textContent = isLogin ? '还没有账号？立即注册' : '已有账号？立即登录';
            document.getElementById('nicknameGroup').style.display = isLogin ? 'none' : '';
        }

        document.getElementById('authForm').addEventListener('submit', e => {
            e.preventDefault();
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            if (!isLogin) {
                data.nickname = document.getElementById('nickname').value || 'momo';
            }
            const endpoint = isLogin ? '/user/login' : '/user/register';
            fetch(`${API_URL}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(r => r.json()).then(d => {
                if (d.code === 200) {
                    const u = d.data;
                    localStorage.setItem('userId', u.id);
                    localStorage.setItem('username', u.username);
                    localStorage.setItem('role', u.role);
                    localStorage.setItem('nickname', u.nickname || u.username);
                    window.location.href = 'index.html';
                } else {
                    showToast(d.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
