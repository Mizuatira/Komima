<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Komima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(160deg,#eef2ff,#f0f9ff,#f8fafc); font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif; color: var(--text); }
        .auth-card { background: #fff; border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); padding: 40px; width: 420px; max-width: 90vw; }
        .auth-card h2 { font-weight: 800; text-align: center; margin-bottom: 28px; }
        .form-control { border-radius: 12px; border: 1.5px solid var(--border); padding: 10px 14px; font-size: 0.92rem; background: #f8fafc; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
        .btn-primary { background: var(--primary); border: none; border-radius: 12px; font-weight: 600; padding: 11px; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-ghost { background: none; border: none; color: var(--primary); font-weight: 600; }
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; }
        .custom-toast { background: #fff; border-radius: 14px; padding: 14px 18px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); margin-bottom: 8px; font-weight: 600; animation: slideIn 0.35s; }
        .custom-toast.success { border-left: 4px solid #10b981; color: #065f46; }
        .custom-toast.error { border-left: 4px solid #ef4444; color: #991b1b; }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2><i class="bi bi-lightning-charge-fill" style="color:var(--primary);"></i> Komima</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-bold">用户名</label>
                <input class="form-control" id="username" placeholder="输入用户名" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">密码</label>
                <input type="password" class="form-control" id="password" placeholder="输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-2"><i class="bi bi-box-arrow-in-right me-1"></i>登录</button>
        </form>
        <p class="text-center text-muted small mt-2">没有账号？<button class="btn-ghost btn-sm" onclick="toggleForm()">去注册</button></p>
        <form id="registerForm" style="display:none">
            <div class="mb-3">
                <label class="form-label fw-bold">用户名</label>
                <input class="form-control" id="regUsername" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">密码</label>
                <input type="password" class="form-control" id="regPassword" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">昵称</label>
                <input class="form-control" id="regNickname" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-2"><i class="bi bi-person-plus me-1"></i>注册</button>
        </form>
        <p class="text-center text-muted small mb-0">默认账号: admin/admin, xiaoming/123456</p>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:8080/api';
        function toast(msg, type) {
            const t = document.createElement('div');
            t.className = `custom-toast ${type}`;
            t.innerHTML = `<span>${msg}</span>`;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 2500);
        }
        function toggleForm() {
            document.getElementById('loginForm').style.display = document.getElementById('loginForm').style.display === 'none' ? '' : 'none';
            document.getElementById('registerForm').style.display = document.getElementById('registerForm').style.display === 'none' ? '' : 'none';
        }
        function saveSession(u) {
            localStorage.setItem('userId', u.id);
            localStorage.setItem('username', u.username);
            localStorage.setItem('role', u.role);
            localStorage.setItem('nickname', u.nickname || u.username);
            window.location.href = 'index.html';
        }
        document.getElementById('loginForm').addEventListener('submit', e => {
            e.preventDefault();
            fetch(`${API}/user/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
            }).then(r => r.json()).then(d => {
                if (d.code === 200) saveSession(d.data);
                else toast(d.message, 'error');
            });
        });
        document.getElementById('registerForm').addEventListener('submit', e => {
            e.preventDefault();
            fetch(`${API}/user/register`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: document.getElementById('regUsername').value, password: document.getElementById('regPassword').value, nickname: document.getElementById('regNickname').value })
            }).then(r => r.json()).then(d => {
                if (d.code === 200) saveSession(d.data);
                else toast(d.message, 'error');
            });
        });
    </script>
</body>
</html>
