<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - Komima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        body { min-height:100vh; background: linear-gradient(160deg,#eef2ff,#f0f9ff,#f8fafc); font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; color:var(--text); }
        .navbar { background: linear-gradient(135deg,var(--primary-dark),var(--primary),#818cf8); box-shadow:0 4px 24px rgba(99,102,241,0.25); padding:10px 0; }
        .navbar-brand { font-weight:800; font-size:1.4rem; display:flex; align-items:center; gap:8px; }
        .navbar .nav-link { color:#fff; font-weight:500; padding:8px 16px; border-radius:8px; transition:all 0.2s; margin:0 2px; }
        .navbar .nav-link:hover, .navbar .nav-link.active { background:rgba(255,255,255,0.15); }
        .user-badge { background:rgba(255,255,255,0.15); border-radius:50px; padding:5px 14px; display:flex; align-items:center; gap:8px; font-weight:500; color:#fff; }
        .user-avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#fbbf24,#f59e0b); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:0.8rem; }
        .data-card { background:#fff; border-radius:20px; box-shadow:0 4px 24px rgba(0,0,0,0.06); padding:36px; max-width:600px; margin:32px auto; }
        .data-card h3 { font-weight:800; text-align:center; margin-bottom:24px; }
        .form-control, .form-select { border-radius:12px; border:1.5px solid var(--border); padding:10px 14px; font-size:0.92rem; background:#f8fafc; }
        .form-control:focus, .form-select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(99,102,241,0.12); background:#fff; }
        .btn-primary { background:var(--primary); border:none; border-radius:12px; font-weight:600; padding:12px; }
        .btn-primary:hover { background:var(--primary-dark); }
        .toast-container { position:fixed; top:24px; right:24px; z-index:9999; }
        .custom-toast { background:#fff; border-radius:14px; padding:14px 18px; box-shadow:0 12px 40px rgba(0,0,0,0.15); margin-bottom:8px; font-weight:600; animation:slideIn 0.35s; }
        .custom-toast.success { border-left:4px solid #10b981; color:#065f46; }
        .custom-toast.error { border-left:4px solid #ef4444; color:#991b1b; }
        @keyframes slideIn { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-lightning-charge-fill"></i>Komima</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#pnav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="pnav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-fill me-1"></i>首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="publish.html"><i class="bi bi-plus-circle-fill me-1"></i>发布</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html"><i class="bi bi-person-fill me-1"></i>个人</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <div class="user-badge">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <span id="currentUser">用户</span>
                    </div>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="data-card">
            <h3><i class="bi bi-person-fill me-2"></i>编辑个人资料</h3>
            <form id="profileForm"><div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">昵称</label>
                    <input class="form-control" id="pfNickname" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">性别</label>
                    <select class="form-select" id="pfGender">
                        <option value="0">未设置</option><option value="1">男</option><option value="2">女</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">学院</label>
                    <input class="form-control" id="pfCollege">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">专业</label>
                    <input class="form-control" id="pfMajor">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">电话</label>
                    <input class="form-control" id="pfPhone">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">微信</label>
                    <input class="form-control" id="pfWechat">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">QQ</label>
                    <input class="form-control" id="pfQq">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">邮箱</label>
                    <input class="form-control" id="pfEmail">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4"><i class="bi bi-check-lg me-1"></i>保存修改</button></form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:8080/api';
        const uid = localStorage.getItem('userId');
        const nick = localStorage.getItem('nickname') || '用户';
        const role = localStorage.getItem('role');
        if (!uid) location.href = 'login.html';

        document.getElementById('currentUser').textContent = nick;
        document.getElementById('userAvatar').textContent = nick.charAt(0).toUpperCase();

        function logout() { localStorage.clear(); location.href = 'login.html'; }
        function toast(msg, type) {
            type = type || 'success';
            const t = document.createElement('div');
            t.className = `custom-toast ${type}`;
            t.innerHTML = `<span>${msg}</span>`;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 2500);
        }

        fetch(`${API}/user/${uid}`).then(r => r.json()).then(d => {
            if (d.code !== 200) return;
            const u = d.data;
            document.getElementById('pfNickname').value = u.nickname || '';
            document.getElementById('pfGender').value = u.gender || 0;
            document.getElementById('pfCollege').value = u.college || '';
            document.getElementById('pfMajor').value = u.major || '';
            document.getElementById('pfPhone').value = u.phone || '';
            document.getElementById('pfWechat').value = u.wechat || '';
            document.getElementById('pfQq').value = u.qq || '';
            document.getElementById('pfEmail').value = u.email || '';
        });

        document.getElementById('profileForm').addEventListener('submit', e => {
            e.preventDefault();
            fetch(`${API}/user/${uid}/profile`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nickname: document.getElementById('pfNickname').value,
                    gender: parseInt(document.getElementById('pfGender').value),
                    college: document.getElementById('pfCollege').value,
                    major: document.getElementById('pfMajor').value,
                    phone: document.getElementById('pfPhone').value,
                    wechat: document.getElementById('pfWechat').value,
                    qq: document.getElementById('pfQq').value,
                    email: document.getElementById('pfEmail').value
                })
            }).then(r => r.json()).then(d => {
                if (d.code === 200) {
                    localStorage.setItem('nickname', document.getElementById('pfNickname').value);
                    document.getElementById('currentUser').textContent = document.getElementById('pfNickname').value;
                    document.getElementById('userAvatar').textContent = document.getElementById('pfNickname').value.charAt(0).toUpperCase();
                    toast('已保存');
                } else toast(d.message, 'error');
            });
        });
    </script>
</body>
</html>
